<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Empréstimo - UNESP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="background-slider" aria-hidden="true">
    <div class="background-slider-track">
      <div class="background-slide slide-gen"></div>
      <div class="background-slide slide-lab"></div>
      <div class="background-slide slide-osci"></div>
      <div class="background-slide slide-gen"></div>
      <div class="background-slide slide-lab"></div>
      <div class="background-slide slide-osci"></div>
    </div>
    <div class="background-overlay"></div>
  </div>

  <main class="container">
    <div class="card">
      <h1>Sistema de Empréstimo</h1>
      <p>Laboratórios da UNESP</p>

      <div class="buttons">
        <button class="btn" id="openModal">Login do Administrador</button>
        <button class="btn" id="openLoanModal">Solicitar Empréstimo</button>
        <button class="btn btn-secondary-main" id="openTrackModal">Acompanhar Solicitação</button>
      </div>
    </div>
  </main>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Acesso Administrador</h2>
        <button class="close-btn" id="closeModal">&times;</button>
      </div>
      <div class="modal-body">
        <form id="adminLoginForm">
          <label for="usuario">Usuário ou e-mail institucional</label>
          <input type="text" id="usuario" placeholder="ex: admin ou nome.sobrenome@unesp.br">

          <label for="senha">Senha</label>
          <input type="password" id="senha" placeholder="Digite sua senha">

          <div id="adminFeedback" class="feedback-message" style="display: none;"></div>
          <div class="modal-actions-row">
            <button type="button" class="btn-secondary-main modal-login-btn-secondary" id="openNewAdminBtn">Novo Administrador</button>
            <button type="submit" class="modal-login-btn">Entrar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="loanModalOverlay">
    <div class="modal modal-loan">
      <div class="modal-header">
        <h2>Solicitar Empréstimo</h2>
        <button class="close-btn" id="closeLoanModal">&times;</button>
      </div>

      <div class="modal-body">
        <form id="loanRequestForm">
          <div class="form-group">
            <label for="requesterName">Nome completo *</label>
            <input type="text" id="requesterName" placeholder="Ex: Maria Fernanda Souza" required>
          </div>

          <div class="form-group">
            <label for="requesterEmail">E-mail institucional *</label>
            <input type="email" id="requesterEmail" placeholder="maria.souza@unesp.br" required>
          </div>

          <div class="form-group">
            <label for="requestLocation">Laboratório *</label>
            <select id="requestLocation" required>
              <option value="">Selecione o laboratório...</option>
            </select>
          </div>

          <div class="modal-section-header">
            <h3>Itens do empréstimo</h3>
          </div>

          <div id="requestItemsContainer" class="item-lines"></div>
          <div class="item-add-action">
            <button type="button" class="ghost-btn" id="addRequestItemBtn">+ Adicionar item</button>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="loanDate">Data prevista para retirada *</label>
              <input type="date" id="loanDate" required>
            </div>
            <div class="form-group">
              <label for="returnDate">Data prevista para devolução *</label>
              <input type="date" id="returnDate" required>
            </div>
          </div>

          <div id="loanFeedback" class="feedback-message" style="display: none;"></div>
          <button type="submit" class="modal-login-btn" id="submitLoanBtn">Enviar solicitação</button>
        </form>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="siteModalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="siteModalTitle">Informação</h2>
        <button class="close-btn" id="siteModalClose">&times;</button>
      </div>
      <div class="modal-body" id="siteModalBody"></div>
      <div class="modal-actions" id="siteModalFooter"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
